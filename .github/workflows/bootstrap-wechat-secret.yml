name: Bootstrap WeChat Secret

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  write-secret:
    name: Write Secret Manager value
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
      WECHAT_TOKEN_VALUE: ${{ secrets.WECHAT_TOKEN_BOOTSTRAP }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create or update wechat-token
        run: |
          set -euo pipefail

          if [[ -z "${WECHAT_TOKEN_VALUE}" ]]; then
            echo "::error::WECHAT_TOKEN_BOOTSTRAP secret is required"
            exit 1
          fi

          if gcloud secrets describe wechat-token \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            printf "%s" "${WECHAT_TOKEN_VALUE}" | gcloud secrets versions add \
              wechat-token \
              --project="${GCP_PROJECT_ID}" \
              --data-file=-
          else
            printf "%s" "${WECHAT_TOKEN_VALUE}" | gcloud secrets create \
              wechat-token \
              --project="${GCP_PROJECT_ID}" \
              --replication-policy=automatic \
              --data-file=-
          fi

          gcloud secrets add-iam-policy-binding wechat-token \
            --project="${GCP_PROJECT_ID}" \
            --member="serviceAccount:${CLOUD_RUN_SERVICE_ACCOUNT}" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet
